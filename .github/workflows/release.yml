name: Build & Release Flutter APK

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    name: Build APK and Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Get all tags and history

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Recreate Flutter Project Structure
        run: |
          # Backup our custom files
          mkdir -p /tmp/backup/lib
          mkdir -p /tmp/backup/android/kotlin
          mkdir -p /tmp/backup/android/layout
          mkdir -p /tmp/backup/android/xml
          
          cp mobile/pubspec.yaml /tmp/backup/
          cp mobile/lib/main.dart /tmp/backup/lib/
          cp mobile/android/app/src/main/kotlin/com/example/warga_ambyar_mobile/WargaAmbyarWidgetProvider.kt /tmp/backup/android/kotlin/
          cp mobile/android/app/src/main/res/layout/widget_layout.xml /tmp/backup/android/layout/
          cp mobile/android/app/src/main/res/xml/widget_info.xml /tmp/backup/android/xml/
          cp mobile/android/app/src/main/AndroidManifest.xml /tmp/backup/android/
          
          # Delete existing mobile dir to do a clean recreate
          rm -rf mobile
          
          # Run flutter create to initialize all required wrapper build scripts (Gradle, etc.)
          flutter create --org com.example --project-name warga_ambyar_mobile mobile
          
          # Restore our custom files
          cp /tmp/backup/pubspec.yaml mobile/
          cp /tmp/backup/lib/main.dart mobile/lib/
          
          # Ensure directories exist in the newly created project
          mkdir -p mobile/android/app/src/main/kotlin/com/example/warga_ambyar_mobile
          mkdir -p mobile/android/app/src/main/res/layout
          mkdir -p mobile/android/app/src/main/res/xml
          
          cp /tmp/backup/android/kotlin/WargaAmbyarWidgetProvider.kt mobile/android/app/src/main/kotlin/com/example/warga_ambyar_mobile/
          cp /tmp/backup/android/layout/widget_layout.xml mobile/android/app/src/main/res/layout/
          cp /tmp/backup/android/xml/widget_info.xml mobile/android/app/src/main/res/xml/
          cp /tmp/backup/android/AndroidManifest.xml mobile/android/app/src/main/AndroidManifest.xml

      - name: Install Dependencies
        run: |
          cd mobile
          flutter pub get

      # ponytail: Keep version bumping simple using plain bash. No heavy npm/python packages needed.
      - name: Auto-Bump Version
        id: bump_version
        run: |
          VERSION_LINE=$(grep "^version:" mobile/pubspec.yaml)
          VERSION=$(echo $VERSION_LINE | awk '{print $2}')
          BASE_VERSION=$(echo $VERSION | cut -d'+' -f1)
          BUILD_NUMBER=$(echo $VERSION | cut -d'+' -f2)
          
          MAJOR=$(echo $BASE_VERSION | cut -d'.' -f1)
          MINOR=$(echo $BASE_VERSION | cut -d'.' -f2)
          PATCH=$(echo $BASE_VERSION | cut -d'.' -f3)
          
          NEW_PATCH=$((PATCH + 1))
          NEW_BUILD=$((BUILD_NUMBER + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH+$NEW_BUILD"
          
          echo "Bumping version from $VERSION to $NEW_VERSION"
          sed -i "s/^version:.*/version: $NEW_VERSION/" mobile/pubspec.yaml
          
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "new_version_tag=v$MAJOR.$MINOR.$NEW_PATCH" >> $GITHUB_OUTPUT
          echo "tag_name=v$MAJOR.$MINOR.$NEW_PATCH-build$NEW_BUILD" >> $GITHUB_OUTPUT

      - name: Build APK (Release Mode)
        run: |
          cd mobile
          flutter build apk --release

      - name: Commit & Push Version Bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mobile/pubspec.yaml
          # Use [skip ci] to strictly avoid trigger loops, although GITHUB_TOKEN pushes generally do not trigger actions
          git commit -m "chore: bump version to ${{ steps.bump_version.outputs.version }} [skip ci]"
          git push origin main

      - name: Create and Push Tag
        run: |
          git tag ${{ steps.bump_version.outputs.tag_name }}
          git push origin ${{ steps.bump_version.outputs.tag_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.bump_version.outputs.tag_name }}
          name: Release ${{ steps.bump_version.outputs.new_version_tag }}
          body: |
            Release Otomatis Build APK Warga Ambyar Mobile.
            
            - Versi Aplikasi: ${{ steps.bump_version.outputs.version }}
            - Tag Rilis: ${{ steps.bump_version.outputs.tag_name }}
          draft: false
          prerelease: false
          files: mobile/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
