name: Build & Release Native Kotlin APK

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    name: Build APK and Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # ponytail: Keep version bumping simple using plain bash.
      - name: Auto-Bump Version
        id: bump_version
        run: |
          VERSION_CODE_LINE=$(grep "versionCode" mobile/app/build.gradle)
          VERSION_NAME_LINE=$(grep "versionName" mobile/app/build.gradle)
          
          CODE=$(echo $VERSION_CODE_LINE | awk '{print $2}')
          NAME=$(echo $VERSION_NAME_LINE | awk '{print $2}' | tr -d '"')
          
          NEW_CODE=$((CODE + 1))
          
          MAJOR=$(echo $NAME | cut -d'.' -f1)
          MINOR=$(echo $NAME | cut -d'.' -f2)
          PATCH=$(echo $NAME | cut -d'.' -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_NAME="$MAJOR.$MINOR.$NEW_PATCH"
          
          echo "Bumping versionCode from $CODE to $NEW_CODE"
          echo "Bumping versionName from $NAME to $NEW_NAME"
          
          sed -i "s/versionCode.*/versionCode $NEW_CODE/" mobile/app/build.gradle
          sed -i "s/versionName.*/versionName \"$NEW_NAME\"/" mobile/app/build.gradle
          
          echo "version=$NEW_NAME" >> $GITHUB_OUTPUT
          echo "tag_name=v$NEW_NAME-build$NEW_CODE" >> $GITHUB_OUTPUT

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2

      - name: Generate Wrapper and Build APK
        run: |
          cd mobile
          gradle wrapper --gradle-version 8.0.2
          chmod +x gradlew
          ./gradlew :app:assembleRelease

      - name: Commit & Push Version Bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mobile/app/build.gradle
          git commit -m "chore: bump android version to ${{ steps.bump_version.outputs.version }} [skip ci]"
          git push origin main

      - name: Create and Push Tag
        run: |
          git tag ${{ steps.bump_version.outputs.tag_name }}
          git push origin ${{ steps.bump_version.outputs.tag_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.bump_version.outputs.tag_name }}
          name: Release ${{ steps.bump_version.outputs.tag_name }}
          body: |
            Release Otomatis Build APK Gang Ambar Native Kotlin.
            
            - Versi Aplikasi: ${{ steps.bump_version.outputs.version }}
            - Tag Rilis: ${{ steps.bump_version.outputs.tag_name }}
          draft: false
          prerelease: false
          files: mobile/app/build/outputs/apk/release/Gang_Ambar_v*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
